<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Button Website</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:90%;
      max-width:350px;
      background:white;
      padding:25px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom:20px;
      color:#333;
    }

    .btn{
      width:100%;
      padding:15px;
      margin:10px 0;
      border:none;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .btn1{background:#ff4757;}
    .btn2{background:#1e90ff;}
    .btn3{background:#2ed573;}
    .btn4{background:#ffa502;}
    .btn5{background:#8e44ad;}
  </style>
</head>
<body>

<div class="container">

  <h1>My Website</h1>

  <!-- Button 1 -->
  <button class="btn btn1" onclick="openAd1()">
    Button 1
  </button>

  <!-- Button 2 -->
  <button class="btn btn2" onclick="openAd2()">
    Button 2
  </button>

  <!-- Button 3 -->
  <button class="btn btn3" onclick="openAd3()">
    Button 3
  </button>

  <!-- Button 4 -->
  <button class="btn btn4" onclick="openAd4()">
    Button 4
  </button>

  <!-- Button 5 -->
  <button class="btn btn5" onclick="openAd5()">
    Button 5
  </button>

</div>

<script>

function openAd1() {
  var s = document.createElement("script");
  s.src = "https://quge5.com/88/tag.min.js";
  s.setAttribute("data-zone", "239183");
  s.async = true;
  s.setAttribute("data-cfasync", "false");
  document.body.appendChild(s);
}

function openAd2() {
  window.location.href = "https://google.com";
}

function openAd3() {
  window.location.href = "https://youtube.com";
}

function openAd4() {
  window.location.href = "https://facebook.com";
}

function openAd5() {
  window.location.href = "https://telegram.org";
}

</script>

</body>
</html>

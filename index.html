            --tg-button-color: #2481cc;

        }
        body.dark {
            --tg-bg-color: #1e1e1e;
            --tg-text-color: #ffffff;
            --tg-hint-color: #aaaaaa;
            --tg-link-color: #6ab0f5;
            --tg-button-color: #6ab0f5;
            --tg-secondary-bg-color: #2c2c2c;
        }
        body {
            background-color: var(--tg-bg-color);
            color: var(--tg-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            padding: 0;

            width: 100%;

            margin: 0 auto;

            height: auto !important;

        }
        .ad-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);

        .ad-content {
            background: var(--tg-secondary-bg-color);
            color: var(--tg-text-color);
            padding: 1.5rem;
            border-radius: 2rem;
            text-align: center;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .timer-bar {
            height: 4px;
            background: var(--tg-link-color);
            width: 100%;
            border-radius: 2px;
            margin-top: 1rem;
            transition: width 0.1s linear;
        }
        .nav-active {
            color: var(--tg-link-color);
            filter: drop-shadow(0 0 2px currentColor);
        }
        button:active {
            transform: scale(0.97);
        }
        /* Native Banner iframe responsive */
        .ad-native-container iframe {
            max-width: 100%;
            border: none;
            margin: 0 auto;
            display: block;
        }
    </style>
</head>

    <script>
        // ----------------------------- Adsterra Native Banner Injectors -----------------------------
        // Banner-1 (728x90 iframe)
        function injectNativeBanner1(containerId) {

            if(container) {
                container.innerHTML = `

                `;

        }
        
        function injectNativeBanner2(containerId) {
            const container = document.getElementById(containerId);
            if(container) {
                container.innerHTML = `
                    <div class="ad-native-container w-full overflow-hidden rounded-lg flex justify-center">
                        <script>
                            atOptions = {
                                'key' : 'ad5e0307df7c9a82c0dc8962d86dbf59',
                                'format' : 'iframe',
                                'height' : 250,
                                'width' : 300,
                                'params' : {}
                            };
                        <\/script>
                        <script src="https://www.highperformanceformat.com/ad5e0307df7c9a82c0dc8962d86dbf59/invoke.js"><\/script>
                    </div>
                `;
            }
        }
        
        // Adsterra-A and Adsterra-B redirect URLs
        const ADSTERRA_A_URL = "https://www.effectivecpmnetwork.com/d2sf620192?key=8dd05b08600f23e56e079a1472c6c069";
        const ADSTERRA_B_URL = "https://omg10.com/4/11010596";
        
        // Show Ad with real redirect (opens link in new tab, then simulates watching)
        // For user experience, we open the ad link in a new tab and simulate a timer.
        // After timer finishes, resolve promise.
        function showRealAd(adType, durationSec = 10) {
            return new Promise((resolve) => {
                const url = adType === 'A' ? ADSTERRA_A_URL : ADSTERRA_B_URL;
                // Open ad in new tab
                const adWindow = window.open(url, '_blank');
                
                const modal = document.createElement('div');
                modal.className = 'ad-modal';
                modal.innerHTML = `
                    <div class="ad-content">
                        <div class="text-xl font-bold mb-2">📢 Adsterra ${adType}</div>
                        <p class="text-sm">Please watch the ad in the new tab. Come back after ${durationSec} seconds.</p>
                        <div class="timer-bar" style="width: 100%"></div>
                        <p class="text-xs mt-2 text-tg-hint">${durationSec} sec remaining</p>
                        <button id="closeAdEarly" class="mt-3 text-red-400 text-sm">Close & Cancel</button>
                    </div>
                `;
                document.body.appendChild(modal);
                
                let elapsed = 0;
                const interval = setInterval(() => {
                    elapsed += 0.5;
                    const percent = Math.max(0, (durationSec - elapsed) / durationSec * 100);
                    const bar = modal.querySelector('.timer-bar');
                    if(bar) bar.style.width = `${percent}%`;
                    const timerText = modal.querySelector('.text-tg-hint');
                    if(timerText) timerText.innerText = `${Math.max(0, durationSec - elapsed).toFixed(1)} sec remaining`;
                    if(elapsed >= durationSec) {
                        clearInterval(interval);
                        modal.remove();
                        if(adWindow && !adWindow.closed) adWindow.close();
                        resolve(true);
                    }
                }, 500);
                
                document.getElementById('closeAdEarly')?.addEventListener('click', () => {
                    clearInterval(interval);
                    modal.remove();
                    if(adWindow && !adWindow.closed) adWindow.close();
                    resolve(false);
                });
            });
        }
        
        // For auto tasks or multiple ads in sequence
        async function showMultipleRealAds(adType, count, eachDuration, onProgress) {
            for(let i=0; i<count; i++) {
                const success = await showRealAd(adType, eachDuration);
                if(!success) return false;
                if(onProgress) onProgress(i+1);
            }
            return true;
        }
        
        // ----------------------------- APP STATE -----------------------------
        let currentUser = { id: 'anon_' + Math.floor(Math.random()*100000), first_name: 'User', username: 'user', joined: new Date().toISOString() };
        let userBalance = 1250; // starting demo
        let lastDailyClaim = null;
        let dailyStreak = 1;
        let totalSpinsToday = 0;
        let lastSpinReset = Date.now();
        const SPIN_LIMIT_PER_CYCLE = 21;
        const CYCLE_MS = 4 * 60 * 60 * 1000;
        let spinLock = false;
        
        let tasksCompletedToday = 0;
        let lastTaskReset = Date.now();
        const TASK_LIMIT = 20;
        
        let referredUsers = [];
        let referralEarnings = 0;
        
        let withdrawAdsWatched = 0;
        let exchangeAdsWatched = 0;
        const requiredWithdrawAds = 10;
        
        let autoSpinActive = false;
        let autoSpinLoopRunning = false;
        
        // wheel globals
        const SEGMENTS = [50, 70, 90, 100, 120, 140, 150, 0];
        const SEGMENT_ANGLES = 360 / 8;
        let wheelCanvas = null;
        let ctx = null;
        let isSpinning = false;
        
        function drawWheel() {
            if(!wheelCanvas || !ctx) return;
            const size = wheelCanvas.width;
            const center = size/2;
            const radius = size/2 - 5;
            for(let i=0; i<SEGMENTS.length; i++) {
                const startAngle = i * SEGMENT_ANGLES * Math.PI/180;
                const endAngle = (i+1) * SEGMENT_ANGLES * Math.PI/180;
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? '#3b82f6' : '#ef4444';
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, startAngle, endAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(startAngle + SEGMENT_ANGLES/2 * Math.PI/180);
                ctx.fillStyle = 'white';
                ctx.font = `bold ${Math.floor(size/14)}px sans-serif`;
                ctx.fillText(SEGMENTS[i]===0?'Try':SEGMENTS[i], radius-30, 8);
                ctx.restore();
            }
            ctx.beginPath();
            ctx.arc(center, center, 15, 0, 2*Math.PI);
            ctx.fillStyle = '#1e293b';
            ctx.fill();
        }
        
        async function performSpin(isFreeInitial = false) {
            if(isSpinning) return false;
            if(!isFreeInitial) {
                if(totalSpinsToday >= SPIN_LIMIT_PER_CYCLE) {
                    alert(`Limit ${SPIN_LIMIT_PER_CYCLE} spins per 4 hours reached.`);
                    return false;
                }
                // Show Adsterra-A before spin
                const success = await showRealAd('A', 10);
                if(!success) { alert("Ad cancelled, spin not started."); return false; }
            }
            const randomSegment = Math.floor(Math.random() * SEGMENTS.length);
            const reward = SEGMENTS[randomSegment];
            let spins = 8 + Math.floor(Math.random() * 10);
            const angleDelta = (randomSegment * SEGMENT_ANGLES) + (SEGMENT_ANGLES/2);
            let start = null;
            const duration = 1800;
            isSpinning = true;
            function animateSpin(timestamp) {
                if(!start) start = timestamp;
                const elapsed = timestamp - start;
                let progress = Math.min(1, elapsed/duration);
                const easeOut = 1 - Math.pow(1-progress, 3);
                const rotation = spins * 360 * easeOut + angleDelta;
                if(wheelCanvas) wheelCanvas.style.transform = `rotate(${rotation}deg)`;
                if(progress < 1) requestAnimationFrame(animateSpin);
                else {
                    isSpinning = false;
                    if(reward > 0) {
                        showClaimModal(reward, !isFreeInitial);
                    } else {
                        alert('Try Again! No coins won.');
                        if(!isFreeInitial) totalSpinsToday++;
                        saveData();
                        updateUI();
                    }
                }
            }
            requestAnimationFrame(animateSpin);
            return true;
        }
        
        async function showClaimModal(reward, shouldCountSpin=true) {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'ad-modal';
            modalDiv.innerHTML = `
                <div class="ad-content">
                    <div class="text-2xl mb-2">🎉 You won ${reward} Coins!</div>
                    <button id="claimBtn" class="bg-green-500 px-6 py-2 rounded-full text-white font-bold mt-2">Claim Reward</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
            document.getElementById('claimBtn').onclick = async () => {
                modalDiv.remove();
                const adSuccess = await showRealAd('B', 10);
                if(adSuccess) {
                    addCoins(reward);
                    if(shouldCountSpin) {
                        totalSpinsToday++;
                        saveData();
                    }
                    updateUI();
                    alert(`+${reward} Coins added!`);
                } else {
                    alert("Ad cancelled, reward not claimed.");
                }
            };
        }
        
        // Auto Spin logic with Adsterra-A x2 per spin
        async function startAutoSpin() {
            if(autoSpinActive) {
                alert("Auto spin already running");
                return;
            }
            if(totalSpinsToday >= SPIN_LIMIT_PER_CYCLE) {
                alert(`Auto spin: limit ${SPIN_LIMIT_PER_CYCLE} reached.`);
                return;
            }
            autoSpinActive = true;
            async function autoSpinCycle() {
                while(autoSpinActive && totalSpinsToday < SPIN_LIMIT_PER_CYCLE) {
                    // Show two Adsterra-A ads sequentially (15 sec each)
                    const ad1 = await showRealAd('A', 15);
                    if(!ad1) { stopAutoSpin(); break; }
                    const ad2 = await showRealAd('A', 15);
                    if(!ad2) { stopAutoSpin(); break; }
                    
                    // Execute spin (no extra ad, because auto ads already played)
                    if(isSpinning) { await new Promise(r=>setTimeout(r,500)); continue; }
                    const randomSegment = Math.floor(Math.random() * SEGMENTS.length);
                    const reward = SEGMENTS[randomSegment];
                    let spins = 8 + Math.floor(Math.random() * 10);
                    const angleDelta = (randomSegment * SEGMENT_ANGLES) + (SEGMENT_ANGLES/2);
                    isSpinning = true;
                    const duration = 1500;
                    let startAnim = null;
                    await new Promise((resolveAnim) => {
                        function anim(t) {
                            if(!startAnim) startAnim = t;
                            const elapsed = t - startAnim;
                            let prog = Math.min(1, elapsed/duration);
                            const rot = spins * 360 * (1-Math.pow(1-prog,3)) + angleDelta;
                            if(wheelCanvas) wheelCanvas.style.transform = `rotate(${rot}deg)`;
                            if(prog<1) requestAnimationFrame(anim);
                            else {
                                isSpinning = false;
                                if(reward>0) {
                                    addCoins(reward);
                                    alert(`Auto Spin: +${reward} coins!`);
                                } else {
                                    alert('Try Again!');
                                }
                                totalSpinsToday++;
                                saveData();
                                updateUI();
                                resolveAnim();
                            }
                        }
                        requestAnimationFrame(anim);
                    });
                    if(!autoSpinActive) break;
                    await new Promise(r=>setTimeout(r, 800));
                }
                if(totalSpinsToday >= SPIN_LIMIT_PER_CYCLE) alert("Auto spin finished: daily limit reached.");
                autoSpinActive = false;
            }
            autoSpinCycle();
        }
        function stopAutoSpin() {
            autoSpinActive = false;
        }
        
        // Daily reward
        async function claimDaily() {
            const today = new Date().toDateString();
            if(lastDailyClaim === today) { alert("Already claimed today! Resets at UTC midnight."); return; }
            const adSuccess = await showRealAd('B', 10);
            if(!adSuccess) { alert("Ad cancelled, daily reward not claimed."); return; }
            const rewards = [10,20,30,50,70,90,100];
            let rewardIdx = (dailyStreak-1) % 7;
            let rewardCoins = rewards[rewardIdx];
            addCoins(rewardCoins);
            lastDailyClaim = today;
            dailyStreak = (dailyStreak % 7) + 1;
            saveData();
            updateUI();
            alert(`Daily reward ${rewardCoins} coins claimed!`);
        }
        
        // Task system with real ads
        const tasksList = [
            { id: 'watchVideo', name: 'Watch Video', reward: 70, type: 'single', adType: 'B', duration:20 },
            { id: 'autoWatchVideo', name: 'Auto Watch video', reward: 70, type: 'auto', adType: 'A', duration:15, count:2 },
            { id: 'watchAdd', name: 'Watch Add', reward: 70, type: 'single', adType: 'B', duration:20 },
            { id: 'autoWatchAdd', name: 'Auto Watch Add', reward: 70, type: 'auto', adType: 'A', duration:15, count:2 }
        ];
        async function startTask(task) {
            if(tasksCompletedToday >= TASK_LIMIT) { alert(`Task limit ${TASK_LIMIT} per 4 hours reached.`); return; }
            if(task.type === 'single') {
                const success = await showRealAd(task.adType, task.duration);
                if(!success) { alert("Ad cancelled, task incomplete."); return; }
                addCoins(task.reward);
                tasksCompletedToday++;
                alert(`Task completed! +${task.reward} coins.`);
            } else if(task.type === 'auto') {
                for(let i=0; i<task.count; i++) {
                    const success = await showRealAd(task.adType, task.duration);
                    if(!success) { alert("Auto task interrupted."); return; }
                }
                addCoins(task.reward);
                tasksCompletedToday++;
                alert(`Auto Task done! +${task.reward} coins.`);
            }
            saveData();
            updateUI();
        }
        
        // Referral
        function generateReferralLink() {
            return `https://t.me/FreeEarnBot?start=ref_${currentUser.id}`;
        }
        function addReferral(refId) { if(!referredUsers.includes(refId)) { referredUsers.push(refId); referralEarnings+=400; addCoins(400); saveData(); } }
        
        // Withdraw & Exchange
        async function requestWithdraw(method, address) {
            if(userBalance < 10000000) { alert(`Minimum 10,000,000 coins required`); return; }
            if(referredUsers.length < 7) { alert(`Need at least 7 referrals. Current: ${referredUsers.length}`); return; }
            let adsNeeded = requiredWithdrawAds - withdrawAdsWatched;
            if(adsNeeded > 0) {
                const success = await showMultipleRealAds('A', adsNeeded, 15);
                if(!success) { alert("Withdraw cancelled"); return; }
                withdrawAdsWatched = requiredWithdrawAds;
            }
            alert(`Withdraw request to ${method}: ${address}. 10,000,000 coins deducted.`);
            deductCoins(10000000);
            withdrawAdsWatched = 0;
            saveData();
            updateUI();
        }
        async function exchangeCoins(amountBDT) {
            const rate = 2000; // 2000 coins = 1 BDT
            let neededCoins = amountBDT * rate;
            if(userBalance < neededCoins) { alert("Insufficient balance"); return; }
            let adsNeeded = 5 - exchangeAdsWatched;
            if(adsNeeded > 0) {
                const success = await showMultipleRealAds('B', adsNeeded, 20);
                if(!success) { alert("Exchange cancelled"); return; }
                exchangeAdsWatched = 5;
            }
            deductCoins(neededCoins);
            alert(`Exchanged ${neededCoins} coins to ${amountBDT} BDT (simulated).`);
            exchangeAdsWatched = 0;
            saveData();
            updateUI();
        }
        
        // Data persistence
        function loadData() {
            const stored = localStorage.getItem('freeEarnDataReal');
            if(stored) {
                try {
                    const data = JSON.parse(stored);
                    userBalance = data.balance || 1250;
                    lastDailyClaim = data.lastDailyClaim;
                    dailyStreak = data.dailyStreak || 1;
                    totalSpinsToday = data.totalSpinsToday || 0;
                    lastSpinReset = data.lastSpinReset || Date.now();
                    tasksCompletedToday = data.tasksCompletedToday || 0;
                    lastTaskReset = data.lastTaskReset || Date.now();
                    referredUsers = data.referredUsers || [];
                    referralEarnings = data.referralEarnings || 0;
                    withdrawAdsWatched = data.withdrawAdsWatched || 0;
                    exchangeAdsWatched = data.exchangeAdsWatched || 0;
                } catch(e) {}
            }
            if(Date.now() - lastSpinReset >= CYCLE_MS) { totalSpinsToday = 0; lastSpinReset = Date.now(); }
            if(Date.now() - lastTaskReset >= CYCLE_MS) { tasksCompletedToday = 0; lastTaskReset = Date.now(); }
            saveData();
        }
        function saveData() {
            const data = {
                balance: userBalance, lastDailyClaim, dailyStreak, totalSpinsToday, lastSpinReset,
                tasksCompletedToday, lastTaskReset, referredUsers, referralEarnings,
                withdrawAdsWatched, exchangeAdsWatched
            };
            localStorage.setItem('freeEarnDataReal', JSON.stringify(data));
        }
        function addCoins(amt) { userBalance += amt; saveData(); updateUI(); }
        function deductCoins(amt) { if(userBalance>=amt) userBalance -= amt; saveData(); updateUI(); }
        
        let currentPage = 'home';
        function updateUI() { renderPage(currentPage); }
        
        function renderPage(page) {
            const container = document.getElementById('page-content');
            if(!container) return;
            const balance = userBalance.toLocaleString();
            let html = '';
            if(page === 'home') {
                html = `
                    <div class="flex justify-between items-center bg-tg-secondary-bg p-3 rounded-2xl shadow">
                        <button id="profileBtn" class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center">👤</button>
                        <div class="font-bold text-xl">💰 ${balance}</div>
                        <div class="w-10"></div>
                    </div>
                    <div id="nativeBannerTop"></div>
                    <div class="wheel-container"><canvas id="wheelCanvas" width="300" height="300" class="rounded-full shadow-lg"></canvas></div>
                    <div class="flex gap-4 justify-center flex-wrap">
                        <button id="spinBtn" class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold shadow">🎡 SPIN (Free 1st)</button>
                        <button id="autoSpinBtn" class="bg-purple-600 text-white px-5 py-3 rounded-full">🔄 Auto Spin</button>
                        <button id="stopAutoBtn" class="bg-red-500 text-white px-5 py-3 rounded-full">⏹️ Stop</button>
                    </div>
                    <div id="nativeBannerMid"></div>
                    <div class="bg-tg-secondary-bg p-4 rounded-2xl">
                        <h3 class="font-bold">Daily Streak Reward</h3>
                        <div class="flex justify-between text-sm">${[10,20,30,50,70,90,100].map((v,i)=>`<div class="text-center ${dailyStreak-1===i?'text-yellow-400 font-bold':''}">Day${i+1}<br>${v}</div>`).join('')}</div>
                        <button id="claimDailyBtn" class="mt-3 bg-green-600 w-full py-2 rounded-full text-white">Claim Daily Reward</button>
                    </div>
                    <div id="nativeBannerBottom"></div>
                `;
            } else if(page === 'tasks') {
                html = `<div id="nativeBannerTop"></div>
                        <div class="space-y-3">
                            ${tasksList.map(task => `
                                <div class="bg-tg-secondary-bg p-3 rounded-2xl flex justify-between items-center">
                                    <div><span class="font-semibold">${task.name}</span><span class="text-green-500 ml-2">+${task.reward}</span></div>
                                    <button data-task='${JSON.stringify(task)}' class="task-start bg-blue-500 px-4 py-2 rounded-full text-white">${task.type==='auto'?'Start Auto':'Go'}</button>
                                </div>
                            `).join('')}
                        </div>
                        <div id="nativeBannerBottom"></div>`;
            } else if(page === 'referral') {
                html = `<div id="nativeBannerTop"></div>
                        <div class="bg-tg-secondary-bg p-4 rounded-2xl">
                            <p class="font-bold">Referral Link</p>
                            <div class="flex gap-2"><input id="refLink" readonly value="${generateReferralLink()}" class="flex-1 p-2 rounded bg-gray-100 dark:bg-gray-800"><button id="copyRef" class="bg-blue-500 px-3 rounded">Copy</button></div>
                            <p class="mt-2">👥 Referred: ${referredUsers.length} users</p>
                            <p>🏆 Earned from referrals: ${referralEarnings} coins</p>
                        </div>
                        <div id="nativeBannerBottom"></div>`;
            } else if(page === 'wallet') {
                html = `<div id="nativeBannerTop"></div>
                        <div class="bg-tg-secondary-bg p-4 rounded-2xl text-center"><h2 class="text-2xl font-bold">💰 ${balance} Coins</h2></div>
                        <div class="bg-tg-secondary-bg p-4 rounded-2xl space-y-3">
                            <h3 class="font-bold">Withdraw (Min 10M coins + 7 refs)</h3>
                            <input id="bikashNum" placeholder="Bkash Number" class="w-full p-2 border rounded"><button id="withdrawBkash" class="bg-green-600 w-full py-2 rounded">Withdraw Bkash</button>
                            <input id="usdtAddr" placeholder="USDT TRC20 Address" class="w-full p-2 border rounded"><button id="withdrawUSDT" class="bg-green-600 w-full py-2 rounded">Withdraw USDT</button>
                            <h3 class="font-bold">Exchange (2000 coins = 1 BDT)</h3>
                            <input id="exchangeBDT" placeholder="Amount in BDT" class="w-full p-2 border rounded"><button id="exchangeBtn" class="bg-yellow-500 w-full py-2 rounded">Exchange</button>
                        </div>
                        <div id="nativeBannerBottom"></div>`;
            }
            container.innerHTML = html;
            // Inject native banners in all placeholder divs
            if(document.getElementById('nativeBannerTop')) injectNativeBanner1('nativeBannerTop');
            if(document.getElementById('nativeBannerMid')) injectNativeBanner1('nativeBannerMid');
            if(document.getElementById('nativeBannerBottom')) injectNativeBanner2('nativeBannerBottom');
            
            if(page === 'home') {
                wheelCanvas = document.getElementById('wheelCanvas');
                if(wheelCanvas) { ctx = wheelCanvas.getContext('2d'); wheelCanvas.width=300; wheelCanvas.height=300; drawWheel(); }
                document.getElementById('spinBtn')?.addEventListener('click', async()=>{
                    if(totalSpinsToday===0 && !isSpinning) await performSpin(true);
                    else if(!isSpinning) await performSpin(false);
                    else alert("Spinning");
                });
                document.getElementById('autoSpinBtn')?.addEventListener('click', startAutoSpin);
                document.getElementById('stopAutoBtn')?.addEventListener('click', stopAutoSpin);
                document.getElementById('claimDailyBtn')?.addEventListener('click', claimDaily);
                document.getElementById('profileBtn')?.addEventListener('click', ()=>alert(`User: ${currentUser.first_name}\nID: ${currentUser.id}\nTotal Earned: ${userBalance} coins`));
            }
            if(page === 'tasks') {
                document.querySelectorAll('.task-start').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const taskData = JSON.parse(btn.getAttribute('data-task'));
                        startTask(taskData);
                    });
                });
            }
            if(page === 'referral') {
                document.getElementById('copyRef')?.addEventListener('click', ()=>{
                    document.getElementById('refLink').select(); document.execCommand('copy'); alert('Link copied');
                });
            }
            if(page === 'wallet') {
                document.getElementById('withdrawBkash')?.addEventListener('click', ()=>{
                    const num = document.getElementById('bikashNum').value;
                    if(num) requestWithdraw('Bkash', num);
                });
                document.getElementById('withdrawUSDT')?.addEventListener('click', ()=>{
                    const addr = document.getElementById('usdtAddr').value;
                    if(addr) requestWithdraw('USDT TRC20', addr);
                });
                document.getElementById('exchangeBtn')?.addEventListener('click', ()=>{
                    const amt = parseInt(document.getElementById('exchangeBDT').value);
                    if(amt>0) exchangeCoins(amt);
                });
            }
        }

                tg.expand();

                const theme = tg.themeParams;
                if(theme?.bg_color === '#1e1e1e') document.body.classList.add('dark');

            loadData();
            renderPage('home');

                btn.addEventListener('click', () => {
                    const nav = btn.getAttribute('data-nav');

                    btn.classList.add('nav-active');
